<!DOCTYPE html>
<html lang="de" data-theme="auto">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LaundryAI">
<meta id="themeColorMeta" name="theme-color" content="#0a0a0f">
<link rel="manifest" href="/icons/manifest.json">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<title>LaundryAI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f18;
    --surface: #13151f;
    --surface2: #1a1d2e;
    --border: #2a2d3e;
    --accent: #4fc3f7;
    --accent2: #7c4dff;
    --text: #e8eaf6;
    --muted: #6b7280;
    --green: #6dbd8a;
    --red: #e07878;
    --yellow: #d4a855;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 4px 60px;
  }

  header {
    text-align: center;
    margin-bottom: 48px;
  }

  .logo {
    font-family: 'Unbounded', sans-serif;
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 700;
    letter-spacing: -1px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    color: var(--muted);
    font-size: 13px;
    margin-top: 6px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .source-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 11px;
    color: var(--muted);
    margin-top: 10px;
  }

  .source-badge::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--green);
    border-radius: 50%;
    display: inline-block;
  }

  .search-wrap {
    width: 100%;
    max-width: 520px;
    margin-bottom: 40px;
  }

  .search-inner {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  input {
    flex: 1;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(79,195,247,0.12);
  }

  input::placeholder { color: var(--muted); }

  button {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 12px;
    padding: 14px 22px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    color: #fff;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    white-space: nowrap;
  }

  button:hover { opacity: 0.9; }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  .examples {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 12px;
  }

  .chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 5px 12px;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }

  .chip:hover { border-color: var(--accent); color: var(--accent); }

  .result {
    width: 100%;
    max-width: 900px;
    display: none;
    flex-direction: column;
    gap: 12px;
    animation: fadeIn 0.35s ease;
  }

  .result.visible { display: flex; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .verb-header {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 16px 16px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }

  .verb-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 36px;
    font-weight: 700;
    color: var(--accent);
  }

  .verb-forms {
    font-size: 15px;
    color: var(--muted);
    margin-top: 6px;
  }

  .verb-forms .hf {
    color: var(--yellow);
  }

  .verb-right {
    text-align: right;
  }

  .verb-bedeutung {
    font-size: 15px;
    color: var(--text);
    margin-bottom: 8px;
  }

  .tag {
    display: inline-block;
    background: rgba(79,195,247,0.1);
    border: 1px solid rgba(79,195,247,0.2);
    border-radius: 6px;
    padding: 2px 10px;
    font-size: 11px;
    color: var(--accent);
    margin: 2px 2px 0 0;
  }

  .tenses-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 16px;
  }

  .tense-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .tense-card:hover { border-color: var(--accent2); }

  .tense-name {
    background: var(--surface2);
    padding: 12px 18px;
    font-family: 'Unbounded', sans-serif;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .tense-label { color: var(--accent); font-size: 10px; letter-spacing: 1px; }

  .conj-row {
    display: grid;
    grid-template-columns: 90px 1fr;
    padding: 8px 18px;
    gap: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: background 0.15s;
    align-items: center;
  }

  .conj-row:last-child { border-bottom: none; }
  .conj-row:hover { background: rgba(79,195,247,0.05); }

  .pronoun { color: var(--muted); font-size: 13px; }
  .form { font-size: 15px; font-weight: 500; }

  .info-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px;
  }

  .info-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 20px;
  }

  .info-card h3 {
    font-family: 'Unbounded', sans-serif;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }

  .imper-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .imper-item { display: flex; flex-direction: column; gap: 3px; }
  .imper-pron { font-size: 11px; color: var(--muted); }
  .imper-form { font-size: 15px; font-weight: 500; }

  .bsp-item {
    font-size: 13px;
    color: var(--muted);
    font-style: italic;
    padding: 5px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }

  .bsp-item:last-child { border-bottom: none; }

  .source-link {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    margin-top: -8px;
  }

  .source-link a { color: var(--accent); text-decoration: none; }
  .source-link a:hover { text-decoration: underline; }

  .loading { text-align: center; padding: 60px; color: var(--muted); display: none; }
  .loading.visible { display: block; }

  .spinner {
    width: 36px; height: 36px;
    border: 2.5px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error {
    background: rgba(224,120,120,0.1);
    border: 1px solid rgba(224,120,120,0.3);
    border-radius: 12px;
    padding: 16px 20px;
    color: var(--red);
    display: none;
    font-size: 13px;
  }

  .error.visible { display: block; }

  .no-data { color: var(--muted); font-size: 13px; font-style: italic; }

  .verb-meta { margin-bottom: 8px; }
  .verb-title-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .speak-lg { font-size: 22px !important; }
  .verb-bedeutung { font-size: 14px; color: var(--muted); margin-top: 6px; }

  /* Save button */
  .save-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(109,189,138,0.12);
    border: 1px solid rgba(109,189,138,0.3);
    border-radius: 10px;
    padding: 8px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--green);
    cursor: pointer;
    transition: all 0.15s;
    margin-top: 8px;
  }
  .save-btn:hover { background: rgba(109,189,138,0.22); }
  .save-btn.saved { color: var(--muted); border-color: var(--border); cursor: default; }
  .save-btn.saving { opacity: 0.6; cursor: wait; }

  /* Token input */
  .token-wrap {
    width: 100%;
    max-width: 520px;
    margin-bottom: 12px;
  }
  .token-inner {
    display: flex;
    gap: 8px;
  }
  .token-inner input {
    font-size: 12px;
    padding: 8px 12px;
  }
  .token-save-btn {
    background: var(--surface2) !important;
    border: 1px solid var(--border) !important;
    border-radius: 10px;
    padding: 8px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted) !important;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .token-save-btn:hover { border-color: var(--green) !important; color: var(--green) !important; }

  /* Autocomplete */
  .search-wrap { position: relative; }

  .autocomplete {
    position: absolute;
    top: calc(100% + 4px);
    left: 0; right: 0;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    z-index: 100;
    display: none;
  }

  .autocomplete.visible { display: block; }

  .ac-item {
    padding: 10px 16px;
    font-size: 15px;
    cursor: pointer;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: background 0.1s;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .ac-item:last-child { border-bottom: none; }
  .ac-item:hover, .ac-item.active { background: rgba(79,195,247,0.08); }
  .ac-item .ac-meaning { font-size: 11px; color: var(--muted); }
  .ac-item .ac-verb { color: var(--text); }
  .ac-item mark { background: none; color: var(--accent); font-weight: 700; }

  /* verbformen.ru markup */
  .vf-stress { font-weight: 700; text-decoration: underline; text-underline-offset: 3px; }
  .vf-it { font-style: italic; opacity: 0.85; }
  .vf-bold { font-weight: 700; }

  /* TTS button */
  .speak-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    font-size: 16px;
    padding: 2px 6px;
    border-radius: 6px;
    transition: color 0.15s;
    vertical-align: middle;
    line-height: 1;
  }
  .speak-btn:hover { color: var(--accent); }

  .main-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    overflow-x: auto;
    overflow-y: hidden;
  }

  .main-table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    background: var(--surface);
    color: var(--text);
  }

  .main-table thead tr {
    background: var(--surface2);
    border-bottom: 1.5px solid var(--border);
  }

  .main-table th {
    padding: 8px 4px;
    font-family: 'Unbounded', sans-serif;
    font-size: 9px;
    font-weight: 400;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--accent);
    text-align: left;
  }

  .main-table th:first-child {
    color: var(--muted);
    width: 70px;
  }

  .main-table tbody tr {
    border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: background 0.15s;
  }

  .main-table tbody tr:last-child { border-bottom: none; }
  .main-table tbody tr:hover { background: rgba(79,195,247,0.05); }

  td.main-pronoun {
    padding: 7px 4px 7px 10px;
    color: var(--muted);
    font-size: 10px;
    white-space: nowrap;
    width: 52px;
  }

  td.main-form {
    padding: 7px 4px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
  }

  td.main-form:nth-child(2) { color: var(--text); }
  td.main-form:nth-child(3) { color: var(--yellow); }
  td.main-form:nth-child(4) { color: var(--green); }

  @media (max-width: 400px) {
    td.main-pronoun { font-size: 10px; padding: 8px 6px; }
    td.main-form { font-size: 12px; padding: 8px 6px; }
    .main-table th { font-size: 8px; padding: 8px 6px; letter-spacing: 0; }
  }

  @media (max-width: 600px) {
    .verb-header { flex-direction: column; }
    .verb-right { text-align: left; }
  }

  /* PWA Install Banner */
  #pwa-banner {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 1.5px solid var(--border);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 1000;
    box-shadow: 0 -8px 32px rgba(0,0,0,0.4);
    animation: slideUp 0.35s ease;
    transform: translateZ(0);
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  #pwa-banner.hidden { display: none; }
  #pwa-banner .pwa-icon {
    width: 48px; height: 48px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
  }
  #pwa-banner .pwa-text { flex: 1; }
  #pwa-banner .pwa-title {
    font-size: 14px; font-weight: 600; color: var(--text);
    margin-bottom: 2px;
  }
  #pwa-banner .pwa-sub {
    font-size: 11px; color: var(--muted); line-height: 1.4;
  }
  #pwa-banner .pwa-actions {
    display: flex; gap: 8px; flex-shrink: 0;
  }
  #pwa-banner .pwa-install-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 10px;
    padding: 9px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    color: #fff;
    cursor: pointer;
    white-space: nowrap;
  }
  #pwa-banner .pwa-dismiss-btn {
    background: var(--surface2) !important;
    border: 1px solid var(--border) !important;
    border-radius: 10px;
    padding: 9px 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--muted) !important;
    cursor: pointer;
    white-space: nowrap;
  }
  .pwa-ios-steps {
    font-size: 11px; color: var(--muted);
    margin-top: 4px; line-height: 1.6;
  }
</style>
</head>
<body>

<!-- PWA Install Banner -->
<div id="pwa-banner" class="hidden">
  <div class="pwa-icon">📖</div>
  <div class="pwa-text">
    <div class="pwa-title">Установить приложение</div>
    <div class="pwa-sub" id="pwa-sub-text">Добавить на главный экран для быстрого доступа</div>
  </div>
  <div class="pwa-actions">
    <button class="pwa-install-btn" id="pwa-install-btn">Установить</button>
    <button class="pwa-dismiss-btn" id="pwa-dismiss-btn">✕</button>
  </div>
</div>

<script>
(function() {
  // Don't show if already installed or dismissed recently
  const dismissed = localStorage.getItem('pwa_dismissed');
  if (dismissed && Date.now() - parseInt(dismissed) < 7 * 24 * 60 * 60 * 1000) return;

  const banner = document.getElementById('pwa-banner');
  const installBtn = document.getElementById('pwa-install-btn');
  const dismissBtn = document.getElementById('pwa-dismiss-btn');
  const subText = document.getElementById('pwa-sub-text');

  // Check if already installed as PWA
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches
    || window.navigator.standalone === true;
  if (isStandalone) return;

  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isAndroid = /android/i.test(navigator.userAgent);

  let deferredPrompt = null;

  // Android: intercept native install prompt
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    subText.textContent = 'Установить как приложение — работает офлайн';
    installBtn.textContent = 'Установить';
    banner.classList.remove('hidden');
  });

  // iOS: show manual instructions
  if (isIOS && !isStandalone) {
    // Delay a bit so page loads first
    setTimeout(() => {
      subText.innerHTML = 'Нажмите <strong style="color:var(--accent)">Поделиться</strong> → <strong style="color:var(--accent)">На экран «Домой»</strong>';
      installBtn.textContent = 'Как?';
      installBtn.onclick = () => {
        subText.innerHTML = '1) Нажмите <strong style="color:var(--accent)">⎙</strong> внизу браузера<br>2) Выберите «На экран „Домой"»<br>3) Нажмите «Добавить»';
        installBtn.style.display = 'none';
      };
      banner.classList.remove('hidden');
    }, 1500);
  }

  // Android install click
  if (!isIOS) {
    installBtn.addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        deferredPrompt = null;
        banner.classList.add('hidden');
      }
    });
  }

  // Dismiss
  dismissBtn.addEventListener('click', () => {
    banner.classList.add('hidden');
    localStorage.setItem('pwa_dismissed', Date.now().toString());
  });

  // Hide banner after install
  window.addEventListener('appinstalled', () => {
    banner.classList.add('hidden');
  });
})();
</script>

<header>
  <div class="logo">Verbkonjugation</div>
  <div class="subtitle">Deutsche Verben · Alle Zeiten</div>
  <div class="source-badge">Quelle: verbformen.ru</div>
  <a href="/export.html" style="display:inline-block;margin-top:8px;font-size:11px;color:var(--muted);text-decoration:none;letter-spacing:1px;" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--muted)'">📖 Словарь / Экспорт</a>
</header>

<div class="token-wrap">
  <div class="token-inner">
    <input type="password" id="ghToken" placeholder="GitHub Token (ghp_…)" autocomplete="off">
    <button class="token-save-btn" onclick="saveToken()">💾</button>
  </div>
</div>

<div class="search-wrap">
  <div class="search-inner">
    <input type="text" id="verbInput" placeholder="Verb eingeben…" autocomplete="off" autocorrect="off" spellcheck="false">
    <button id="searchBtn" onclick="lookup()">Suchen</button>
  </div>
  <div class="autocomplete" id="autocomplete"></div>
  <div class="examples">
    <div class="chip" onclick="quickSearch('sein')">sein</div>
    <div class="chip" onclick="quickSearch('haben')">haben</div>
    <div class="chip" onclick="quickSearch('gehen')">gehen</div>
    <div class="chip" onclick="quickSearch('machen')">machen</div>
    <div class="chip" onclick="quickSearch('kommen')">kommen</div>
    <div class="chip" onclick="quickSearch('sprechen')">sprechen</div>
    <div class="chip" onclick="quickSearch('werden')">werden</div>
  </div>
</div>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <div>Daten werden geladen…</div>
</div>

<div class="error" id="error"></div>
<div class="result" id="result"></div>

<script>
const verbInput = document.getElementById('verbInput');
const searchBtn = document.getElementById('searchBtn');
const loadingEl = document.getElementById('loading');
const errorEl  = document.getElementById('error');
const resultEl = document.getElementById('result');



function quickSearch(v) { verbInput.value = v; lookup(); }

async function lookup() {
  const verb = verbInput.value.trim().toLowerCase();
  if (!verb) return;

  setLoading(true);

  try {
    const res = await fetch(`/api/v2?w=${encodeURIComponent(verb)}`);
    const data = await res.json();

    if (!res.ok || data.error) {
      showError(data.error || `Ошибка ${res.status}`);
      return;
    }

    const tenseCount = Object.keys(data.tenses || {}).length;
    if (tenseCount === 0) {
      showError(`Глагол не найден или данных нет. Проверь написание.`);
      return;
    }

    render(data);
  } catch(e) {
    showError(`Ошибка сети: ${e.message}`);
  } finally {
    setLoading(false);
  }
}

function setLoading(on) {
  loadingEl.classList.toggle('visible', on);
  if (on) {
    errorEl.classList.remove('visible');
    resultEl.classList.remove('visible');
  }
  searchBtn.disabled = on;
}

function showError(msg) {
  errorEl.textContent = msg;
  errorEl.classList.add('visible');
}

const TENSES = [
  { key: 'praesens',        name: 'Präsens',         label: 'Gegenwart' },
  { key: 'praeteritum',     name: 'Präteritum',      label: 'Vergangenheit' },
  { key: 'perfekt',         name: 'Perfekt',          label: 'Vollendete Geg.' },
  { key: 'plusquamperfekt', name: 'Plusquamperfekt',  label: 'Vorvergangenheit' },
  { key: 'futur1',          name: 'Futur I',           label: 'Zukunft' },
  { key: 'konjunktiv2',     name: 'Konjunktiv II',    label: 'Irrealis' },
];

const PRONOUNS = ['ich', 'du', 'er/sie/es', 'wir', 'ihr', 'sie/Sie'];

function render(d) {
  const hf = d.hauptformen || {};

  // Use rInfStr directly if available: "ist · war · ist gewesen"
  const hauptformenStr = d.rInfStr ||
    [hf.praesens_3sg, hf.praeteritum_3sg, hf.partizip2]
      .filter(Boolean)
      .map(f => `<span class="hf">${f}</span>`)
      .join(' · ');

  // Main table: Pronomen | Präsens | Präteritum | Perfekt
  const mainTenses = [
    { key: 'praesens',    name: 'Präs.' },
    { key: 'praeteritum', name: 'Prät.' },
    { key: 'perfekt',     name: 'Perf.' },
  ];
  const mainRows = PRONOUNS.map(p => {
    const cells = mainTenses.map(t => {
      const form = d.tenses?.[t.key]?.[p] || '—';
      return `<td class="main-form">${form}</td>`;
    }).join('');
    return `<tr><td class="main-pronoun">${p}</td>${cells}</tr>`;
  }).join('');
  const mainTable = `
    <div class="main-card">
      <table class="main-table">
        <thead>
          <tr>
            <th></th>
            ${mainTenses.map(t => `<th>${t.name}</th>`).join('')}
          </tr>
        </thead>
        <tbody>${mainRows}</tbody>
      </table>
    </div>`;

  // Secondary cards for remaining tenses
  const secondaryTenses = TENSES.filter(t => t.key === 'konjunktiv2');
  const tenseCards = secondaryTenses.map(t => {
    const conj = d.tenses?.[t.key];
    if (!conj || Object.keys(conj).length === 0) return '';
    const rows = PRONOUNS.map(p => {
      const form = conj[p] || '—';
      const plainText = form.replace(/<[^>]+>/g,'');
      return `<div class="conj-row"><span class="pronoun">${p}</span><span class="form">${form}</span></div>`;
    }).join('');
    return `
      <div class="tense-card">
        <div class="tense-name">
          <span>${t.name}</span>
          <span class="tense-label">${t.label}</span>
        </div>
        ${rows}
      </div>`;
  }).join('');

  let imperativHtml = '';
  let bspHtml = '';

  const tags = [];
  if (d.niveau) tags.push(d.niveau);
  if (d.verbType) {
    const typRu = d.verbType === 'unregelmäßig' ? 'неправильный' :
                  d.verbType === 'regelmäßig'   ? 'правильный' : d.verbType;
    tags.push(typRu);
  }
  if (d.hilfsverb) tags.push(`вспом.: ${d.hilfsverb}`);

  const rInfMp3 = d.mp3s?.stammformen || d.mp3s?.perfekt || d.mp3s?.praesens || '';
  resultEl.innerHTML = `
    <div class="verb-header">
      <div class="verb-meta">${tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      <div class="verb-title-row">
        <div class="verb-title">${d.infinitiv}</div>
        ${d.mp3s?.infinitiv ? `<button class="speak-btn speak-lg" onclick="speak('${d.mp3s.infinitiv}')">🔊</button>` : ''}
      </div>
      ${hauptformenStr ? `<div class="verb-forms">${hauptformenStr}${rInfMp3 ? `<button class="speak-btn" onclick="speak('${rInfMp3}')">🔊</button>` : ''}</div>` : ''}
      ${d.bedeutung ? `<div class="verb-bedeutung">🇷🇺 ${d.bedeutung}</div>` : ''}
    </div>

    ${mainTable}
    ${tenseCards ? `<div class="tenses-grid">${tenseCards}</div>` : ''}

    ${(imperativHtml || bspHtml) ? `<div class="info-grid">${imperativHtml}${bspHtml}</div>` : ''}

    <div class="source-link" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
      <span>Данные: <a href="${d.source}" target="_blank">verbformen.ru</a></span>
      <button class="save-btn" id="saveBtn" onclick="saveVerb()">＋ В словарь</button>
    </div>
  `;

  currentVerb = d;
  // Reset save button
  const sb = document.getElementById('saveBtn');
  if (sb) { sb.textContent = '＋ В словарь'; sb.classList.remove('saved','saving'); sb.disabled = false; }
  resultEl.classList.add('visible');
  console.log('render done, tenseCards length:', tenseCards.length, 'tenses:', Object.keys(d.tenses||{}));
}

// GitHub config
const GH_OWNER = 'Kesik80';
const GH_REPO  = 'Verb_de';
const GH_FILE  = 'verbs.js';

function saveToken() {
  const t = document.getElementById('ghToken').value.trim();
  if (t) {
    localStorage.setItem('gh_token', t);
    document.getElementById('ghToken').style.borderColor = 'var(--green)';
    setTimeout(() => document.getElementById('ghToken').style.borderColor = '', 1500);
  }
}

// Load saved token
window.addEventListener('DOMContentLoaded', () => {
  const t = localStorage.getItem('gh_token');
  if (t) document.getElementById('ghToken').value = t;
});

let currentVerb = null; // stores last rendered verb data

async function ghGet(token, file) {
  const res = await fetch(
    `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${file}`,
    { headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github+json' } }
  );
  if (!res.ok) { const e = await res.json(); throw new Error(e.message || `GitHub ${res.status}`); }
  const data = await res.json();
  const bytes = Uint8Array.from(atob(data.content.replace(/\s/g,'')), c => c.charCodeAt(0));
  return { content: new TextDecoder().decode(bytes), sha: data.sha };
}

async function ghPut(token, file, sha, content, message) {
  const encoded = btoa(String.fromCharCode(...new TextEncoder().encode(content)));
  const res = await fetch(
    `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${file}`,
    {
      method: 'PUT',
      headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json' },
      body: JSON.stringify({ message, content: encoded, sha })
    }
  );
  if (!res.ok) { const e = await res.json(); throw new Error(e.message || `GitHub ${res.status}`); }
  return res.json();
}

async function saveVerb() {
  const btn = document.getElementById('saveBtn');
  if (!btn) return;
  if (!currentVerb?.infinitiv) { btn.textContent = '✗ Нет данных'; return; }

  const token = (localStorage.getItem('gh_token') || document.getElementById('ghToken').value.trim()).trim();
  if (!token) { alert('Введи GitHub Token выше'); return; }

  const v = currentVerb.infinitiv;

  btn.textContent = '⏳ Сохраняю…';
  btn.classList.add('saving');
  btn.disabled = true;

  try {
    // 1. Save to woerterbuch.json (full data)
    const { content: wbRaw, sha: wbSha } = await ghGet(token, 'woerterbuch.json');
    const wb = JSON.parse(wbRaw);

    if (wb[v]) {
      btn.textContent = '✓ Уже в словаре';
      btn.classList.remove('saving');
      btn.classList.add('saved');
      return;
    }

    // Build entry
    const meaning = currentVerb.bedeutung
      ? currentVerb.bedeutung.split(',').slice(0,3).map(s=>s.trim()).join(', ')
      : '';

    wb[v] = {
      niveau:    currentVerb.niveau || '',
      typ:       currentVerb.verbType || '',
      hilfsverb: currentVerb.hilfsverb || 'haben',
      bedeutung: meaning,
      mp3:       currentVerb.mp3s?.infinitiv || '',
      stammformen_mp3: currentVerb.mp3s?.stammformen || '',
      hauptformen: {
        text: currentVerb.rInfStr || '',
        mp3:  currentVerb.mp3s?.stammformen || currentVerb.mp3s?.perfekt || ''
      },
      tabelle: {
        praesens:    currentVerb.tenses?.praesens    || {},
        praeteritum: currentVerb.tenses?.praeteritum || {},
        perfekt:     currentVerb.tenses?.perfekt     || {},
        konjunktiv2: currentVerb.tenses?.konjunktiv2 || {}
      }
    };

    // Sort by niveau then alphabetically
    const niveauOrder = ['A1','A2','B1','B2','C1','C2',''];
    const sorted = Object.fromEntries(
      Object.entries(wb).sort(([a,av],[b,bv]) => {
        const ni = niveauOrder.indexOf(av.niveau||'') - niveauOrder.indexOf(bv.niveau||'');
        if (ni !== 0) return ni;
        return a.localeCompare(b, 'de');
      })
    );

    await ghPut(token, 'woerterbuch.json', wbSha, JSON.stringify(sorted, null, 2), `add: ${v}`);

    // 2. Also add to verbs.js for autocomplete
    try {
      const { content: verbsRaw, sha: verbsSha } = await ghGet(token, 'verbs.js');
      if (!verbsRaw.includes(`['${v}'`)) {
        const safe = meaning.replace(/'/g, "\'");
        const insertAt = verbsRaw.lastIndexOf('];');
        if (insertAt !== -1) {
          const newVerbs = verbsRaw.slice(0, insertAt) + `  ['${v}','${safe}'],\n` + verbsRaw.slice(insertAt);
          await ghPut(token, 'verbs.js', verbsSha, newVerbs, `add autocomplete: ${v}`);
          if (typeof VERBS !== 'undefined') VERBS.push([v, meaning]);
        }
      }
    } catch(e2) { console.warn('verbs.js update failed:', e2); }

    btn.textContent = '✓ Сохранено!';
    btn.classList.remove('saving');
    btn.classList.add('saved');

  } catch(e) {
    btn.textContent = '✗ ' + e.message.slice(0, 35);
    btn.classList.remove('saving');
    btn.disabled = false;
  }
}

let currentAudio = null;
// Verb list with translations


const acEl = document.getElementById('autocomplete');
let acIndex = -1;

verbInput.addEventListener('input', () => {
  const val = verbInput.value.trim().toLowerCase();
  if (!val) { hideAc(); return; }
  const matches = VERBS.filter(([v]) => v.startsWith(val) && v !== val).slice(0, 6);
  if (!matches.length) { hideAc(); return; }
  acIndex = -1;
  acEl.innerHTML = matches.map(([v, m]) => {
    const hl = `<mark>${v.slice(0, val.length)}</mark>${v.slice(val.length)}`;
    return `<div class="ac-item" onclick="pickAc('${v}')"><span class="ac-verb">${hl}</span><span class="ac-meaning">${m}</span></div>`;
  }).join('');
  acEl.classList.add('visible');
});

verbInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') { hideAc(); lookup(); return; }
  const items = acEl.querySelectorAll('.ac-item');
  if (!items.length) return;
  if (e.key === 'ArrowDown') { e.preventDefault(); acIndex = Math.min(acIndex+1, items.length-1); updateAcActive(items); }
  if (e.key === 'ArrowUp')   { e.preventDefault(); acIndex = Math.max(acIndex-1, -1); updateAcActive(items); }
  if (e.key === 'Tab' && acIndex >= 0) { e.preventDefault(); pickAc(items[acIndex].querySelector('.ac-verb').textContent.replace(/<[^>]+>/g,'')); }
});

function updateAcActive(items) {
  items.forEach((el, i) => el.classList.toggle('active', i === acIndex));
  if (acIndex >= 0) verbInput.value = items[acIndex].querySelector('.ac-verb').innerText;
}

function pickAc(v) { verbInput.value = v; hideAc(); lookup(); }
function hideAc() { acEl.classList.remove('visible'); acIndex = -1; }
document.addEventListener('click', e => { if (!e.target.closest('.search-wrap')) hideAc(); });

function speak(url) {
  if (!url) return;
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  currentAudio = new Audio(url);
  currentAudio.play();
}
